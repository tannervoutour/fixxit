# Tool Registry - Master catalog of all available tools
# This file defines all possible tools that can be made available to the AI
# Tool visibility is controlled by tool_config.env

tools:
  # Machine Documentation Search
  search_machine_documentation:
    enabled_by: "TOOL_MACHINE_DOCS"
    description: "Searches for machines and their available documentation. Can filter by machine name, line number, or machine type."
    mcp_function: "search_machine_docs"
    category: "documentation"
    parameters:
      machine_name:
        type: "string"
        description: "Specific machine name (e.g., 'CSP', 'Feeder', 'Folder'). Supports partial matching."
      line_number:
        type: "string"
        enum: ["Line_1", "Line_2", "Line_3", "Line_4", "General"]
        description: "Line designation for production line machines."
      machine_type:
        type: "string"
        enum: ["separator", "feeder", "folder", "ironer", "dryer", "press", "picker", "conveyor", "washer"]
        description: "Type of machine to filter by."

  # Manual Section Retrieval
  get_manual_sections:
    enabled_by: "TOOL_MANUAL_SECTIONS"
    description: "Retrieves available sections from machine manuals. Shows section names, page numbers, and content summaries."
    mcp_function: "get_sections"
    category: "documentation"
    parameters:
      machine_name:
        type: "string"
        description: "Machine to search for (e.g., 'CSP', 'PowerPress')."
      section_name:
        type: "string"
        description: "Specific section name to filter by (e.g., 'Safety', 'Operation', 'Troubleshooting')."
      document_filename:
        type: "string"
        description: "Specific document filename to filter by."

  # Troubleshooting Information Search
  find_troubleshooting_procedures:
    enabled_by: "TOOL_TROUBLESHOOTING"
    description: "Searches for troubleshooting information in documentation sections. Uses full-text search across manual content."
    mcp_function: "find_troubleshooting"
    category: "troubleshooting"
    parameters:
      search_query:
        type: "string"
        description: "Search terms (error symptoms, part names, procedures, etc.). Use specific keywords for best results."
        required: true
      machine_name:
        type: "string"
        description: "Limit search to specific machine to narrow results."

  # Section Content Retrieval
  get_section_content:
    enabled_by: "TOOL_SECTION_CONTENT"
    description: "Retrieves the full content of a specific manual section. Returns complete text with page references."
    mcp_function: "get_section_text"
    category: "documentation"
    parameters:
      machine_name:
        type: "string"
        description: "Name of the machine (must be exact match)."
        required: true
      section_name:
        type: "string"
        description: "Name of the section to retrieve (e.g., 'Safety', 'Operation')."
        required: true
      document_filename:
        type: "string"
        description: "Specific document if machine has multiple manuals."

  # Procedure Search
  search_procedures:
    enabled_by: "TOOL_PROCEDURES"
    description: "Searches for specific types of procedures across all documentation. Finds safety, operation, maintenance procedures."
    mcp_function: "search_manual_procedures"
    category: "procedures"
    parameters:
      procedure_type:
        type: "string"
        description: "Type of procedure to search for (e.g., 'safety', 'operation', 'maintenance', 'installation')."
        required: true
      machine_name:
        type: "string"
        description: "Limit search to specific machine."

  # Database Query Tools (for advanced queries)
  query_documentation_database:
    enabled_by: "TOOL_DATABASE_QUERY"
    description: "Executes custom SQL SELECT queries against the documentation database. Provides access to complex data relationships."
    mcp_function: "execute_sql_query"
    category: "database"
    parameters:
      query:
        type: "string"
        description: "SQL SELECT query to execute. Must be a valid SELECT statement."
        required: true
      limit:
        type: "integer"
        default: 100
        description: "Maximum number of rows to return (default 100, max 1000)."

  # System Overview Tools
  get_documentation_overview:
    enabled_by: "TOOL_SYSTEM_OVERVIEW"
    description: "Provides high-level summary of the documentation database including machine count, document processing status."
    mcp_function: "get_stats"
    category: "system"
    parameters: {}

# Tool Categories for bulk management
categories:
  documentation:
    description: "Machine documentation and manual access tools"
    tools: ["search_machine_documentation", "get_manual_sections"]
  
  troubleshooting:
    description: "Troubleshooting and problem-solving tools"
    tools: ["find_troubleshooting_procedures"]
  
  procedures:
    description: "Procedure and instruction lookup tools"
    tools: ["search_procedures", "get_section_content"]
  
  database:
    description: "Direct database access and custom query tools"
    tools: ["query_documentation_database"]
  
  system:
    description: "System monitoring and overview tools"
    tools: ["get_documentation_overview"]

# Special tools that are always available
always_available:
  - "answer_user_query"  # AI decision completion function